<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clima</title>
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="shortcut icon" href="imagens/logo.ico" type="image/x-icon">
</head>
<body>
    <div id="bloco_geral">
        <p id="loading">Carregando clima...</p>

        <div class="bloco_conteudo">
            <div class="dia_um">
                <p class="nome_dia_um"></p>
                <p class="graus_dia_um"></p>
                <p class="imagem_dia_um"></p>
            </div>

            <div class="dia_dois">
                <p class="nome_dia_dois"></p>
                <p class="graus_dia_dois"></p>
                <p class="imagem_dia_dois"></p>
            </div>

            <div class="dia_tres">
                <p class="nome_dia_tres"></p>
                <p class="graus_dia_tres"></p>
                <p class="imagem_dia_tres"></p>
            </div>

            <div class="dia_quatro">
                <p class="nome_dia_quatro"></p>
                <p class="graus_dia_quatro"></p>
                <p class="imagem_dia_quatro"></p>
            </div>

            <div class="dia_cinco">
                <p class="nome_dia_cinco"></p>
                <p class="graus_dia_cinco"></p>
                <p class="imagem_dia_cinco"></p>
            </div>
        </div>
    </div>

    <script src="javascript/climatizador.js"></script>
</body>
</html>
